# Load container configuration from environment variables
# Limit resources (CPU/RAM)
# Load PostgreSQL configuration from postgresql.conf file
# Persist PostgreSQL data in named volume
services:
  postgresql:
    container_name: ${CONTAINER_NAME}
    image: postgres:18
    command: docker-entrypoint.sh -c 'config_file=/etc/postgresql/postgresql.conf'
    volumes:
    #  to check expected location, use `SHOW config_file;`
    # /var/lib/postgresql/18/docker/postgresql.conf
      - ./configuration/postgresql.conf:/etc/postgresql/postgresql.conf
      - postgresql_data:/var/lib/postgresql
    ports:
      - '${POSTGRESQL_EXPOSED_PORT}:5432'
    # https://hub.docker.com/_/postgres#environment-variables
    environment:
      - POSTGRES_USER=${POSTGRESQL_USER_NAME}
      - POSTGRES_PASSWORD=${POSTGRESQL_USER_PASSWORD}
      - POSTGRES_DB=${POSTGRESQL_DATABASE_NAME}
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8Gb
    healthcheck:
      test: "psql --dbname \"host=localhost port=5432 dbname=${POSTGRESQL_DATABASE_NAME} user=${POSTGRESQL_USER_NAME} password=${POSTGRES_PASSWORD}\" "
      start_period: 10s
      interval: 30s
      timeout: 2s
      retries: 20

volumes:
  postgresql_data: