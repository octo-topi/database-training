#------------------------------------------------------------------------------
#       ---------- PostgreSQL configuration file        ------------
#------------------------------------------------------------------------------


#------------------------------------------------------------------------------
# Source
#------------------------------------------------------------------------------

# https://pgtune.leopard.in.ua/?dbVersion=18&osType=linux&dbType=web&cpuNum=4&totalMemory=8&totalMemoryUnit=GB&connectionNum=20&hdType=ssd

# DB Version: 18
# OS Type: linux
# DB Type: web
# Total Memory (RAM): 8 GB
# CPUs num: 4
# Connections num: 20
# Data Storage: ssd

# max_connections = 20
# shared_buffers = 2GB
# effective_cache_size = 6GB
# maintenance_work_mem = 512MB
# checkpoint_completion_target = 0.9
# wal_buffers = 16MB
# default_statistics_target = 100
# random_page_cost = 1.1
# effective_io_concurrency = 200
# work_mem = 87381kB
# huge_pages = off
# min_wal_size = 1GB
# max_wal_size = 4GB
# max_worker_processes = 4
# max_parallel_workers_per_gather = 2
# max_parallel_workers = 4
# max_parallel_maintenance_workers = 2

#------------------------------------------------------------------------------
# Security
#------------------------------------------------------------------------------
listen_addresses = '*'

#------------------------------------------------------------------------------
# Libraries
#------------------------------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements'

#------------------------------------------------------------------------------
# Memory
#------------------------------------------------------------------------------

# shared memory (cache)
shared_buffers = 2GB

# amount of shared memory used for WAL data that has not yet been written to disk
wal_buffers = 16MB


# backends working memory
max_connections = 20
work_mem = 87381kB

# maintenance workers working memory
maintenance_work_mem = 512MB

# for small systems (< 2GB of RAM) may be beneficial to set to “off”
# https://www.postgresql.org/docs/current/runtime-config-resource.html#GUC-HUGE-PAGES
huge_pages = off

#------------------------------------------------------------------------------
# I/O
#------------------------------------------------------------------------------

# PG + OS cache size
effective_cache_size = 6GB

# planner - disc costs
random_page_cost = 1.1
effective_io_concurrency = 200

#------------------------------------------------------------------------------
# WAL
#------------------------------------------------------------------------------

# disable archiving
wal_level = minimal
max_wal_senders = 0

# The size of WAL files that won't be recycled
min_wal_size = 1GB

# The size of WAL files that will trigger a checkpoint, regardless of frequency
max_wal_size = 4GB

#------------------------------------------------------------------------------
# Checkpointer : reduce
#------------------------------------------------------------------------------

# Smooth out checkpointer activity
checkpoint_completion_target = 0.9

#------------------------------------------------------------------------------
# Parallelism : it depends
#------------------------------------------------------------------------------

max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

#------------------------------------------------------------------------------
# Statistics
#------------------------------------------------------------------------------
default_statistics_target = 100

#------------------------------------------------------------------------------
# Logging
#------------------------------------------------------------------------------

# log all statements, regardless of duration
log_min_duration_statement = 0

# log DDL, DML, ...  - https://postgresqlco.nf/doc/en/param/log_statement/
log_statement = all

# maintenance
log_autovacuum_min_duration = 0
log_checkpoints = TRUE

# Query execution
log_connections = FALSE
log_lock_waits = TRUE
log_temp_files = 0
log_disconnections = FALSE

#------------------------------------------------------------------------------
# Execution plan
#------------------------------------------------------------------------------

# track time elapsed on I/O (displayed in execution plan and pg_stat_io)
track_io_timing = TRUE

# track time elapsed on WAL I/O (displayed in execution plan and pg_stat_io)
track_wal_io_timing = TRUE